<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="blade6a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="blade6b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="hilt6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="reel6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="reelInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow6">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>

  <!-- Left cutlass (bottom-left to top-right) -->
  <g filter="url(#shadow6)" transform="rotate(-45, 256, 290)">
    <!-- Blade -->
    <path d="
      M 256 120
      C 256 120, 264 140, 267 170
      C 272 230, 273 270, 269 310
      C 267 325, 262 332, 256 336
      C 250 332, 245 325, 243 310
      C 239 270, 240 230, 245 170
      C 248 140, 256 120, 256 120
    " fill="url(#blade6a)"/>
    <path d="
      M 256 110
      L 261 122
      C 261 122, 256 117, 251 122 Z
    " fill="#f1f5f9"/>
    <!-- Edge highlight -->
    <path d="
      M 256 120 C 256 120, 264 140, 267 170 C 272 230, 273 270, 269 310 C 267 325, 262 332, 256 336
    " fill="none" stroke="#f8fafc" stroke-width="1" opacity="0.6"/>
    <!-- Crossguard -->
    <rect x="226" y="336" width="60" height="10" rx="5" fill="url(#hilt6)"/>
    <!-- Grip -->
    <rect x="248" y="346" width="16" height="36" rx="3" fill="#4f46e5"/>
    <path d="M 250 353 L 262 357" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 250 363 L 262 367" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pommel -->
    <circle cx="256" cy="388" r="9" fill="url(#hilt6)"/>
  </g>

  <!-- Right cutlass (bottom-right to top-left, mirrored) -->
  <g filter="url(#shadow6)" transform="rotate(45, 256, 290)">
    <!-- Blade -->
    <path d="
      M 256 120
      C 256 120, 264 140, 267 170
      C 272 230, 273 270, 269 310
      C 267 325, 262 332, 256 336
      C 250 332, 245 325, 243 310
      C 239 270, 240 230, 245 170
      C 248 140, 256 120, 256 120
    " fill="url(#blade6b)"/>
    <path d="
      M 256 110
      L 261 122
      C 261 122, 256 117, 251 122 Z
    " fill="#f1f5f9"/>
    <path d="
      M 256 120 C 248 140, 245 170, 240 230 C 239 270, 243 310, 245 325
    " fill="none" stroke="#f8fafc" stroke-width="1" opacity="0.6"/>
    <!-- Crossguard -->
    <rect x="226" y="336" width="60" height="10" rx="5" fill="url(#hilt6)"/>
    <!-- Grip -->
    <rect x="248" y="346" width="16" height="36" rx="3" fill="#4f46e5"/>
    <path d="M 250 353 L 262 357" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 250 363 L 262 367" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pommel -->
    <circle cx="256" cy="388" r="9" fill="url(#hilt6)"/>
  </g>

  <!-- Film reel (replacing skull) -->
  <g filter="url(#glow6)">
    <!-- Outer ring -->
    <circle cx="256" cy="200" r="72" fill="url(#reel6)" stroke="#64748b" stroke-width="2"/>
    <!-- Inner dark area -->
    <circle cx="256" cy="200" r="58" fill="url(#reelInner)"/>

    <!-- Reel spokes / film sprocket holes -->
    <circle cx="256" cy="158" r="10" fill="#1a1a2e" stroke="#475569" stroke-width="1.5"/>
    <circle cx="292" cy="179" r="10" fill="#1a1a2e" stroke="#475569" stroke-width="1.5"/>
    <circle cx="292" cy="221" r="10" fill="#1a1a2e" stroke="#475569" stroke-width="1.5"/>
    <circle cx="256" cy="242" r="10" fill="#1a1a2e" stroke="#475569" stroke-width="1.5"/>
    <circle cx="220" cy="221" r="10" fill="#1a1a2e" stroke="#475569" stroke-width="1.5"/>
    <circle cx="220" cy="179" r="10" fill="#1a1a2e" stroke="#475569" stroke-width="1.5"/>

    <!-- Center hub -->
    <circle cx="256" cy="200" r="16" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="256" cy="200" r="6" fill="#1a1a2e"/>

    <!-- Indigo accent ring -->
    <circle cx="256" cy="200" r="72" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
